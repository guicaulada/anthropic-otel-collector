dist:
  name: anthropic-otel-collector
  module: github.com/guicaulada/anthropic-otel-collector

  output_path: ./dist

receivers:
  - gomod: github.com/guicaulada/anthropic-otel-collector/receiver/anthropicreceiver v0.0.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.146.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.146.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.146.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.146.0

replaces:
  - github.com/guicaulada/anthropic-otel-collector/receiver/anthropicreceiver => ../receiver/anthropicreceiver
