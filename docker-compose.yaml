services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4319:4319"
    volumes:
      - ./docker-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - grafana
    networks:
      - otel

  grafana:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./dashboard/dist:/var/lib/grafana/dashboards:ro
      - ./dashboard/provisioning/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/anthropic.yaml:ro
      - ./docker/run-prometheus.sh:/otel-lgtm/run-prometheus.sh:ro
    networks:
      - otel

networks:
  otel:
    driver: bridge
